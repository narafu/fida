spring:
  application:
    name: fida

  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

server:
  port: ${PORT:7070}
  shutdown: graceful

fanding:
  scraper:
    url: ${SCRAPER_URL:http://playwright-server:3000/scrape}

fida:
  scheduler:
    enabled: ${FIDA_SCHEDULER_ENABLED:true}

gemini:
  api-key: ${GEMINI_API_KEY}

google:
  sheets:
    spreadsheet-id: ${GOOGLE_SHEETS_SPREADSHEET_ID}
    service-account-json-path: ${GOOGLE_SERVICE_ACCOUNT_JSON_PATH:/secrets/service-account.json}
    sheet-name: Fanding

kista:
  url: ${KISTA_URL:https://kista-api.fly.dev}
  internal-token: ${INTERNAL_API_TOKEN}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}

logging:
  level:
    root: INFO
    com.fida: DEBUG
