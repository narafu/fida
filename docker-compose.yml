services:
  fida:
    build: .
    env_file: .env
    volumes:
      - ./secrets:/secrets:ro
      - ./.fida-state:/state
    depends_on:
      playwright-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7070/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  playwright-server:
    build: ./playwright-server
    environment:
      FANDING_EMAIL: ${FANDING_EMAIL}
      FANDING_PASSWORD: ${FANDING_PASSWORD}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
